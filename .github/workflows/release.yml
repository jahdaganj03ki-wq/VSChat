name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Package VSIX
        run: npx vsce package --out apex-agent.vsix

      - name: Generate changelog
        id: changelog
        uses: actions/github-script@v7
        with:
          script: |
            const { data: tags } = await github.rest.repos.listTags({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const lastTag = tags.length > 1 ? tags[1].name : '';
            const { data: commits } = await github.rest.repos.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 50,
            });
            const changelog = commits
              .filter(c => c.commit.message.startsWith('feat') || c.commit.message.startsWith('fix'))
              .map(c => `- ${c.commit.message.split('\n')[0]}`)
              .join('\n');
            core.setOutput('changelog', changelog || 'No changes');

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: apex-agent.vsix
          body: |
            ${{ steps.changelog.outputs.changelog }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
