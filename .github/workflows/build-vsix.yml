name: Build VSIX

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install

      - name: Rebuild SDK
        run: bun run rebuild-sdk
        working-directory: packages/kilo-vscode

      - name: Build CLI binary
        run: bun run prepare:cli-binary
        working-directory: packages/kilo-vscode

      - name: Build extension
        run: node esbuild.js --production
        working-directory: packages/kilo-vscode

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies --skip-license -o out/kilo-code-auto-memory.vsix
        working-directory: packages/kilo-vscode

      - uses: actions/upload-artifact@v7
        with:
          name: kilo-code-auto-memory-vsix
          path: packages/kilo-vscode/out/*.vsix