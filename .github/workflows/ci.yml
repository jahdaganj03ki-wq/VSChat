name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run tests
        run: npm test

      - name: Build with webpack
        run: npm run build

      - name: Package VSIX
        run: npx vsce package --out apex-agent.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: apex-agent-vsix
          path: apex-agent.vsix
          retention-days: 30
